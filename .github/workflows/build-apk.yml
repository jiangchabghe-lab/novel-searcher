name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      PYTHONHTTPSVERIFY: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              openjdk-17-jdk-headless \
              autoconf libtool pkg-config \
              zlib1g-dev libncurses5-dev libsdl2-dev \
              libssl-dev libffi-dev liblzma-dev \
              libbz2-dev libreadline-dev \
              zip unzip python3-venv python3-pip \
              wget curl ca-certificates gnupg

      - name: Set Java home
        run: |
          echo "JAVA_HOME=$(readlink -f /usr/lib/jvm/java-17-openjdk-amd64)" >> $GITHUB_ENV
          echo "ANDROID_API=33" >> $GITHUB_ENV
          echo "ANDROID_MINAPI=24" >> $GITHUB_ENV

      - name: Prepare Python env
        run: |
          set -e
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel --trusted-host pypi.org --trusted-host files.pythonhosted.org
          python -m pip install --upgrade --force-reinstall certifi
          python -m pip install --upgrade chardet urllib3 idna requests
          python -m pip install --upgrade buildozer cython python-for-android
          CERT_PATH=$(python -c "import certifi; print(certifi.where())")
          echo "Cert path: $CERT_PATH"
          ls -la "$CERT_PATH"
          head -5 "$CERT_PATH" || true

      - name: Fix SSL certs
        run: |
          set -e
          . .venv/bin/activate
          CERT_PATH=$(python -c "import certifi; print(certifi.where())")
          echo "Cert path: $CERT_PATH"
          # 用系统证书替换 certifi 的证书文件
          if [ -f /etc/ssl/certs/ca-certificates.crt ]; then
            cp /etc/ssl/certs/ca-certificates.crt "$CERT_PATH"
            echo "Replaced certifi certs with system certs"
          fi
          # 验证
          python -c "import ssl, certifi; ctx = ssl.create_default_context(cafile=certifi.where()); print('SSL OK')"

      - name: Init Android SDK/NDK
        run: |
          set -e
          . .venv/bin/activate
          python -c "import buildozer; print('buildozer OK')"
          python -c "import android; print('p4a OK')" 2>&1 || python -c "from pythonforandroid import __version__; print('p4a version:', __version__)"
          buildozer --version
          buildozer android sdk 2>&1 | tail -30

      - name: Build APK
        run: |
          set -e
          . .venv/bin/activate
          buildozer android debug 2>&1 | tail -50

      - name: Copy APK to artifact dir
        run: |
          mkdir -p dist
          ls -lh bin/ 2>/dev/null || echo "bin/ not found"
          cp bin/*.apk dist/ 2>/dev/null || cp bin/*-debug.apk dist/ || true
          ls -lh dist/ 2>/dev/null

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: novel-searcher-apk
          path: dist/*.apk
          if-no-files-found: error
