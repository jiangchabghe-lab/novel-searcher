name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      PYTHONHTTPSVERIFY: "0"
      PYTHONPATH: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              openjdk-17-jdk-headless \
              autoconf libtool pkg-config \
              zlib1g-dev libncurses5-dev libsdl2-dev \
              libssl-dev libffi-dev liblzma-dev \
              libbz2-dev libreadline-dev \
              zip unzip python3-venv python3-pip \
              wget curl ca-certificates gnupg

      - name: Set Java home
        run: |
          echo "JAVA_HOME=$(readlink -f /usr/lib/jvm/java-17-openjdk-amd64)" >> $GITHUB_ENV
          echo "ANDROID_API=33" >> $GITHUB_ENV
          echo "ANDROID_MINAPI=24" >> $GITHUB_ENV

      - name: Prepare Python env
        run: |
          set -e
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel --trusted-host pypi.org --trusted-host files.pythonhosted.org
          python -m pip install --upgrade --force-reinstall certifi
          python -m pip install --upgrade chardet urllib3 idna requests
          python -m pip install --upgrade buildozer cython python-for-android
          echo "=== Verify imports ==="
          python -c "import certifi; print('certifi OK:', certifi.where())"
          python -c "import buildozer; print('buildozer OK')"
          python -c "from pythonforandroid import __version__; print('p4a OK:', __version__)"

      - name: Create wrapper script
        run: |
          cat > run_buildozer.py << 'PYEOF'
import os
import sys

os.environ['PYTHONHTTPSVERIFY'] = '0'

import ssl
try:
    ssl._create_default_https_context = ssl._create_unverified_context
except Exception:
    pass

import certifi
_orig_where = certifi.where
def _patched_where():
    system_ca = '/etc/ssl/certs/ca-certificates.crt'
    if os.path.exists(system_ca):
        return system_ca
    try:
        return _orig_where()
    except Exception:
        return system_ca
certifi.where = _patched_where

from buildozer import __main__
sys.exit(__main__.main())
PYEOF
          echo "Wrapper created"
          cat run_buildozer.py

      - name: Init Android SDK/NDK
        run: |
          set -e
          . .venv/bin/activate
          echo "=== Test wrapper ==="
          python run_buildozer.py --version
          echo "=== Init SDK ==="
          python run_buildozer.py android sdk 2>&1 | tail -30

      - name: Build APK
        run: |
          set -e
          . .venv/bin/activate
          python run_buildozer.py android debug 2>&1 | tail -50

      - name: Copy APK to artifact dir
        run: |
          mkdir -p dist
          ls -lh bin/ 2>/dev/null || echo "bin/ not found"
          cp bin/*.apk dist/ 2>/dev/null || cp bin/*-debug.apk dist/ || true
          ls -lh dist/ 2>/dev/null

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: novel-searcher-apk
          path: dist/*.apk
          if-no-files-found: error
